<div class="container">
    <div class="container-fluid d-flex">
        <ngb-datepicker #dp [(ngModel)]="selectedDate" (dateSelect)="handleDateChange()" class="mx-auto"></ngb-datepicker>
    </div>
    <div class="jumbotron">
        <h1 class="display-3">{{apod.title}}</h1>
        <p class="lead">{{apod.date}}</p>
        <div class="container-fluid d-flex">
            <img [src]="apod.url" [alt]="apod.title" class="mx-auto" *ngIf="apod.isImage()">
            <youtube-player [videoId]="apod.getVideoID()" *ngIf="apod.isVideo()" class="mx-auto"></youtube-player>
            <div class="alert alert-danger mx-auto" role="alert" *ngIf="!apod.isValid()">
                <strong>Not valid Media</strong>
            </div>
        </div>
        <hr class="my-2">
        <p>{{apod.explanation}}</p>
        <p class="lead">
            <a class="btn btn-primary btn-lg" [href]="apod.hdurl" role="button">HD Image</a>
        </p>
    </div>
    
</div>
