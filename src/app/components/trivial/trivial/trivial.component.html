<div class="container">
    <div class="row mt-5">
        <div class="col-sm-12 col-md-6 col-lg-4 mb-3" *ngFor="let card of cards; let i=index">
            <div class="card h-100">
                <div class="card-body">
                    <h4 class="card-title">{{card.question}}</h4>
                </div>
                <div class="card-footer text-muted" style="background-color: white;">
                    <div class="d-grid gap-2">
                        <button class="btn btn-primary" type="button" *ngFor="let answer of card.answers">{{answer}}</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>
