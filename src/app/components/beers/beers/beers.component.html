<div class="container">
    <ngx-slider [(value)]="minValue" [(highValue)]="maxValue" [options]="options" (userChange)="handleChange()">
    </ngx-slider>
    <div ngbDropdown class="d-inline-block">
        <button type="button" class="btn btn-outline-primary" id="dropdownBasic1" ngbDropdownToggle>{{orderStr}}</button>
        <div ngbDropdownMenu aria-labelledby="dropdownBasic1">
            <button ngbDropdownItem (click)="handleOrder(0)">Alphabetical</button>
            <button ngbDropdownItem (click)="handleOrder(1)">ABV</button>
        </div>
    </div>
    <div ngbDropdown class="d-inline-block">
        <button type="button" class="btn btn-outline-primary" id="dropdownBasic1" ngbDropdownToggle>{{ascendentStr}}</button>
        <div ngbDropdownMenu aria-labelledby="dropdownBasic1">
            <button ngbDropdownItem (click)="handleAscendent(true)">Ascendent</button>
            <button ngbDropdownItem (click)="handleAscendent(false)">Descendent</button>
        </div>
    </div>
    <div class="row">
        <div class="col-sm-12 col-md-6 col-lg-4 mb-4" *ngFor="let beer of filteredBeers">
            <div class="card h-100">
                <img class="card-img-top mx-auto mt-3" [src]="beer.imageUrl" [alt]="beer.name" style="width: 60px;">
                <div class="card-body">
                    <h4 class="card-title">{{beer.name}}</h4>
                    <p class="card-text">{{beer.tagline}}</p>
                    <p class="card-text">{{beer.abv}}</p>
                </div>
            </div>
        </div>
    </div>
</div>
