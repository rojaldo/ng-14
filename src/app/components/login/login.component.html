<div class="container">
    <div class="form-group">
      <label for="">Login</label>
      <input type="text" name="" id="" class="form-control" placeholder="" aria-describedby="helpId" [(ngModel)]="login">
    </div>
    <div class="form-group">
      <label for="">Password</label>
      <input type="password" class="form-control" name="" id="" aria-describedby="helpId" placeholder="" [(ngModel)]="password">
    </div>
    <button type="submit" class="btn btn-primary mt-3" (click)="submit()">Submit</button>
</div>
