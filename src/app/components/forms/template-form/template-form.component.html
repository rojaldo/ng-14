<div class="container">
    <form (ngSubmit)="onSubmit()" #heroForm="ngForm">
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" class="form-control" id="name" required [(ngModel)]="newHero.name" name="name" #name="ngModel" [pattern]="regexName">
            <div [hidden]="name.valid || name.value === '' " class="alert alert-danger">
                Name is required
            </div>
        </div>
    
        <div class="form-group">
            <label for="alterEgo">Description</label>
            <input type="text" class="form-control" id="description" [(ngModel)]="newHero.description" name="description">
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="text" class="form-control" id="email" required [(ngModel)]="newHero.email" name="email" #email="ngModel" [pattern]="regexEmail">
            <div [hidden]="email.valid || email.value === ''" class="alert alert-danger">
                Name is required
            </div>
        </div>

        <div class="form-group">
            <label for="postalCode">Postal Code</label>
            <input type="number" class="form-control" id="postalCode" required [(ngModel)]="newHero.postalCode" name="postalCode" #postalCode="ngModel" [pattern]="regexPostalCode">
            <div [hidden]="postalCode.valid || postalCode.value === 0" class="alert alert-danger">
                Name is required
            </div>
        </div>
    
        <button type="submit" class="btn btn-success" [disabled]="!heroForm.form.valid">Submit</button>
        <button type="button" class="btn btn-default" (click)="removeHero(); heroForm.reset()">New Hero</button>
    </form>
    
</div>
